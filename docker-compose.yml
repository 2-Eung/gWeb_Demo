services:
  db:
    image: pgvector/pgvector:pg16
    container_name: gweb-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  python-api:
    build: ./python
    container_name: gweb-python
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DOCKER_DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    container_name: gweb-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${DOCKER_SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      PYTHON_API_URL: ${DOCKER_PYTHON_API_URL}
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      python-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-cp", "/app", "BackendHealthcheck", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: gweb-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
