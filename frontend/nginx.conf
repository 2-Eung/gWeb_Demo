server {
    listen 80;
    server_name localhost;

    # Hides the Nginx version number in error pages and Server headers
    server_tokens off;

    # Security Headers
    # Protects against Clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Protects against MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Enables XSS filtering in older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Controls how much referrer information is sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions Policy (restricts access to browser APIs)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content Security Policy (Basic default policy, allows connection to any backend API via connect-src *)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://*.steamstatic.com https://*.akamaihd.net; connect-src 'self' *; frame-ancestors 'none';" always;

    # Only allow GET, HEAD, and POST methods for the frontend
    if ($request_method !~ ^(GET|HEAD|POST)$ ) {
        return 405;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files (e.g., .git, .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
        # Re-apply security headers as add_header inside locations can override server-level headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
